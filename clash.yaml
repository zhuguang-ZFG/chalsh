mixed-port: 7890
allow-lan: false
bind-address: '*'
mode: global
log-level: info
dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
  - https://dns.google/dns-query
  - https://1.1.1.1/dns-query
  fallback:
  - https://dns.alidns.com/dns-query
proxies:
- name: '@hi_proxy_iran'
  type: vless
  server: 188.114.98.193
  port: 443
  uuid: a5c05c1e-aa68-443f-8598-09800244bd4b
  tls: true
  servername: kingcloud.biack.ir
  network: ws
  ws-opts:
    path: /LiL
    headers:
      Host: kingcloud.biack.ir
proxy-groups:
- name: AUTO
  type: url-test
  proxies:
  - '@hi_proxy_iran'
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
rules:
- DOMAIN,storeedge.microsoft.com,DIRECT
- DOMAIN,displaycatalog.mp.microsoft.com,DIRECT
- DOMAIN,login.live.com,DIRECT
- DOMAIN,store-images.microsoft.com,DIRECT
- DOMAIN-SUFFIX,mp.microsoft.com,DIRECT
- DOMAIN-SUFFIX,microsoftstore.com,DIRECT
- DOMAIN-SUFFIX,store.microsoft.com,DIRECT
